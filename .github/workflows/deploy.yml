# .github/workflows/mkdocs.yml

name: Deploy MkDocs Site to GitHub Pages

on:
  push:
    branches:
      - main # Or 'master', depending on your default branch name

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This permission is needed for mkdocs gh-deploy to push to the remote branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Action to checkout your repository code
        with:
          fetch-depth: 0 # Required for mkdocs gh-deploy to work correctly with git history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x' # Use the latest Python 3 version

      - name: Install MkDocs and dependencies
        run: |
          if [ -f requirements.txt ]; then
            echo "Installing dependencies from requirements.txt"
            pip install -r requirements.txt
          else
            echo "requirements.txt not found, installing default MkDocs and Material theme"
            pip install mkdocs mkdocs-material # Install MkDocs and mkdocs-material theme
          fi
          # If you have other plugins or themes, add them here if not in requirements.txt:
          # pip install mkdocs-awesome-pages-plugin mkdocs-mermaid2-plugin

      - name: Deploy MkDocs site using gh-deploy
        run: mkdocs gh-deploy --config-file mkdocs.yml --remote-branch main
        env:
          # Set the GITHUB_TOKEN as an environment variable for mkdocs gh-deploy
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
